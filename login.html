<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به سیستم</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Tahoma', system-ui, sans-serif;
            background: linear-gradient(135deg, #0b3b5f, #1e5a7d);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 32px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        h1 {
            color: #0b3b5f;
            margin-bottom: 10px;
        }
        h1 span {
            color: #ffb347;
        }
        p {
            color: #666;
            margin-bottom: 30px;
        }
        label {
            display: block;
            text-align: right;
            font-weight: bold;
            margin-bottom: 8px;
            color: #333;
        }
        input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
            font-size: 16px;
        }
        button {
            width: 100%;
            background: #ffb347;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        button:hover {
            background: #ff9f1c;
        }
        a {
            color: #ffb347;
            text-decoration: none;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <form class="login-box" onsubmit="return false;">
        <h1>پرواز<span>بوک</span></h1>
        <p>به سامانه رزرو بلیط خوش آمدید</p>
        
        <div id="errorMsg" class="error"></div>
        
        <label>ایمیل یا نام کاربری</label>
        <input type="text" id="username" placeholder="example@email.com">
        
        <label>رمز عبور</label>
        <input type="password" id="password" placeholder="••••••••">
        
        <button onclick="login()">ورود به سیستم</button>
        
        <p>حساب ندارید؟ <a href="register.html">ثبت‌نام کنید</a></p>
    </form>

    <script>
        let users = JSON.parse(localStorage.getItem('airline_users')) || [
            { id: 1, username: "user@example.com", password: "123456", fullname: "رضا کریمی", role: "passenger" },
            { id: 2, username: "staff@airline.com", password: "123456", fullname: "علی محمدی", role: "staff" },
            { id: 3, username: "admin@system.com", password: "123456", fullname: "مدیر سیستم", role: "admin" }
        ];
        localStorage.setItem('airline_users', JSON.stringify(users));

        function login() {
            let username = document.getElementById('username').value;
            let password = document.getElementById('password').value;
            let errorDiv = document.getElementById('errorMsg');
            
            if(!username || !password) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = '❌ لطفاً ایمیل و رمز عبور را وارد کنید.';
                return;
            }
            
            let user = users.find(u => u.username === username && u.password === password);
            
            if(!user) {
                errorDiv.style.display = 'block';
                errorDiv.innerText = '❌ ایمیل یا رمز عبور اشتباه است.';
                return;
            }
            
            localStorage.setItem('current_user', JSON.stringify({
                id: user.id,
                username: user.username,
                fullname: user.fullname,
                role: user.role
            }));
            
            if(user.role === 'admin') window.location.href = 'admin.html';
            else if(user.role === 'staff') window.location.href = 'flight.html';
            else window.location.href = 'home.html';
        }
    </script>
</body>
</html>
